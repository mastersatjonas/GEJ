<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GEL IA 2.0 - Técnico Oficial da G&J</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --azul: #003cff;
      --azul-escuro: #08111f;
      --verde: #00b140;
      --amarelo: #ffd700;
      --gelo: #e8f7ff;
      --branco: #ffffff;
      --cinza: #f4f7fb;
      --texto: #1a2233;
      --muted: #6b7a99;
      --borda: #dce8f5;
      --whatsapp: #25d366;
      --radius: 18px;
      --shadow: 0 12px 40px rgba(0, 60, 255, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Nunito", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(0, 177, 64, .18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(0, 60, 255, .18), transparent 35%),
        var(--cinza);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .chat-section {
      width: 100%;
      max-width: 540px;
      height: min(760px, calc(100vh - 36px));
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--branco);
      box-shadow: var(--shadow);
      border: 1px solid var(--borda);
    }

    .chat-header {
      background:
        linear-gradient(135deg, var(--azul-escuro), var(--azul), var(--verde));
      color: white;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .chat-header::before {
      content: "⚽";
      position: absolute;
      right: 22px;
      top: -18px;
      font-size: 82px;
      opacity: .08;
    }

    .header-mascot {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--amarelo);
      background: white;
      flex-shrink: 0;
      z-index: 2;
    }

    .header-mascot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transform: scale(1.15);
    }

    .header-info {
      flex: 1;
      z-index: 2;
    }

    .header-info strong {
      display: block;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .2px;
    }

    .header-info span {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,.82);
    }

    .header-status {
      background: rgba(255,255,255,.13);
      padding: 6px 10px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 2;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4cff91;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      50% {
        opacity: .55;
        transform: scale(.8);
      }
    }

    .header-status span {
      font-size: 11px;
      font-weight: 800;
    }

    .chat-scoreboard {
      background: var(--amarelo);
      color: var(--azul-escuro);
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      padding: 8px 12px;
    }

    .chat-msgs {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        radial-gradient(circle at top right, rgba(232, 247, 255, .9), transparent 30%),
        var(--cinza);
      scroll-behavior: smooth;
    }

    .chat-msgs::-webkit-scrollbar {
      width: 5px;
    }

    .chat-msgs::-webkit-scrollbar-thumb {
      background: var(--borda);
      border-radius: 20px;
    }

    .msg {
      max-width: 90%;
      display: flex;
      gap: 8px;
      animation: fadeUp .25s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.bot {
      align-self: flex-start;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-ava {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      overflow: hidden;
      background: white;
      border: 1.5px solid var(--borda);
      flex-shrink: 0;
      margin-top: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .msg-ava img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transform: scale(1.2);
    }

    .msg.user .msg-ava {
      background: var(--azul);
      color: white;
      font-size: 11px;
      font-weight: 900;
      border-color: var(--azul);
    }

    .msg-bub {
      padding: 11px 14px;
      border-radius: 17px;
      font-size: 13.8px;
      line-height: 1.55;
      word-break: break-word;
    }

    .msg.bot .msg-bub {
      background: white;
      color: var(--texto);
      border: 1px solid var(--borda);
      border-bottom-left-radius: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }

    .msg.user .msg-bub {
      background:
        linear-gradient(135deg, var(--azul), var(--verde));
      color: white;
      border-bottom-right-radius: 5px;
    }

    .chips {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      border: 1.5px solid var(--azul);
      background: white;
      color: var(--azul);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      transition: .2s;
    }

    .chip:hover {
      background: var(--azul);
      color: white;
      transform: translateY(-2px);
    }

    .typing-wrap {
      display: flex;
      gap: 8px;
      align-self: flex-start;
    }

    .typing-ava {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      overflow: hidden;
      background: white;
      border: 1.5px solid var(--borda);
      flex-shrink: 0;
    }

    .typing-ava img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transform: scale(1.2);
    }

    .typing-bub {
      background: white;
      border: 1px solid var(--borda);
      border-radius: 16px;
      border-bottom-left-radius: 5px;
      padding: 12px 15px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bub span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--azul);
      animation: bounce 1.2s infinite;
    }

    .typing-bub span:nth-child(2) {
      animation-delay: .2s;
    }

    .typing-bub span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes bounce {
      30% {
        transform: translateY(-7px);
      }
    }

    .wpp-inline {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--whatsapp);
      color: white;
      padding: 8px 15px;
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 900;
      margin-top: 10px;
      text-decoration: none;
    }

    .chat-footer {
      background: white;
      border-top: 1px solid var(--borda);
      padding: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chat-footer input {
      flex: 1;
      border: 1.5px solid var(--borda);
      background: var(--cinza);
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 13.5px;
      outline: none;
      color: var(--texto);
    }

    .chat-footer input:focus {
      background: white;
      border-color: var(--azul);
      box-shadow: 0 0 0 4px rgba(0, 60, 255, .08);
    }

    .send-btn,
    .wpp-footer-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: .2s;
    }

    .send-btn {
      background: var(--azul);
    }

    .send-btn:hover {
      background: var(--verde);
      transform: scale(1.05);
    }

    .wpp-footer-btn {
      background: var(--whatsapp);
      text-decoration: none;
    }

    .wpp-footer-btn:hover {
      transform: scale(1.05);
    }

    .send-btn svg,
    .wpp-footer-btn svg {
      fill: white;
    }

    .chat-disclaimer {
      background: white;
      border-top: 1px solid var(--borda);
      padding: 8px 12px;
      font-size: 11px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      body {
        padding: 0;
      }

      .chat-section {
        height: 100vh;
        max-width: 100%;
        border-radius: 0;
      }

      .header-status {
        display: none;
      }

      .chat-msgs {
        padding: 14px;
      }
    }
  </style>
</head>

<body>

<section class="chat-section">

  <div class="chat-header">
    <div class="header-mascot">
      <img src="./img/mascote-gej.png" alt="GEL IA 2.0">
    </div>

    <div class="header-info">
      <strong>GEL IA 2.0 🐧</strong>
      <span>Técnico Oficial da G&J • Augustinópolis - TO</span>
    </div>

    <div class="header-status">
      <div class="status-dot"></div>
      <span>Online</span>
    </div>
  </div>

  <div class="chat-scoreboard">
    🏆 Seleção G&J 1 x 0 Calor — Atendimento campeão em refrigeração
  </div>

  <div class="chat-msgs" id="msgs"></div>

  <div class="chat-footer">
    <input type="text" id="chat-input" placeholder="Digite sua dúvida..." />

    <a class="wpp-footer-btn"
       id="wpp-btn"
       href="https://wa.me/5563992354732?text=Olá! Vim pelo site da G%26J e preciso de atendimento."
       target="_blank"
       title="Falar no WhatsApp">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 22C6.486 22 2 17.514 2 12S6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/>
      </svg>
    </a>

    <button class="send-btn" onclick="sendMsg()" title="Enviar">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <div class="chat-disclaimer">
    GEL IA 2.0 • Para emergência, use o botão verde do WhatsApp 💬
  </div>

</section>

<script>
  const WPP_NUMBER = "5563992354732";
  const WPP_BASE = "https://wa.me/" + WPP_NUMBER + "?text=";
  const WPP_BTN = document.getElementById("wpp-btn");

  const msgsEl = document.getElementById("msgs");
  const inputEl = document.getElementById("chat-input");

  let history = [];
  let lead = {
    nome: "",
    telefone: "",
    endereco: "",
    cidade: "",
    equipamento: "",
    problema: "",
    horario: "",
    servico: ""
  };

  let mode = "";
  let step = "";

  const WPP_SVG = `
    <svg viewBox="0 0 24 24" width="15" height="15" style="fill:#fff;flex-shrink:0">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 22C6.486 22 2 17.514 2 12S6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/>
    </svg>
  `;

  function scrollDown() {
    setTimeout(() => msgsEl.scrollTop = msgsEl.scrollHeight, 50);
  }

  function makeBotAva() {
    const d = document.createElement("div");
    d.className = "msg-ava";

    const img = document.createElement("img");
    img.src = "./img/mascote-gej.png";
    img.alt = "GEL IA";

    d.appendChild(img);
    return d;
  }

  function addMsg(role, html, chips = []) {
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;

    const inner = document.createElement("div");
    const bub = document.createElement("div");
    bub.className = "msg-bub";
    bub.innerHTML = html;
    inner.appendChild(bub);

    if (chips.length) {
      const cw = document.createElement("div");
      cw.className = "chips";

      chips.forEach(text => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.textContent = text;
        btn.onclick = () => send(text);
        cw.appendChild(btn);
      });

      inner.appendChild(cw);
    }

    if (role === "bot") {
      wrap.appendChild(makeBotAva());
      wrap.appendChild(inner);
    } else {
      const ava = document.createElement("div");
      ava.className = "msg-ava";
      ava.textContent = "EU";

      wrap.appendChild(ava);
      wrap.appendChild(inner);
    }

    msgsEl.appendChild(wrap);
    scrollDown();
  }

  function showTyping() {
    const t = document.createElement("div");
    t.className = "typing-wrap";
    t.id = "typing";

    const ava = document.createElement("div");
    ava.className = "typing-ava";

    const img = document.createElement("img");
    img.src = "./img/mascote-gej.png";
    img.alt = "GEL digitando";
    ava.appendChild(img);

    const bub = document.createElement("div");
    bub.className = "typing-bub";
    bub.innerHTML = "<span></span><span></span><span></span>";

    t.appendChild(ava);
    t.appendChild(bub);

    msgsEl.appendChild(t);
    scrollDown();
  }

  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function normalize(text) {
    return text.toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  function updateWhatsApp(message) {
    const link = WPP_BASE + encodeURIComponent(message);
    WPP_BTN.href = link;
    return link;
  }

  function createWhatsAppButton(message, label = "Continuar no WhatsApp") {
    const link = updateWhatsApp(message);
    return `<br><a class="wpp-inline" href="${link}" target="_blank">${WPP_SVG} ${label}</a>`;
  }

  function resetFlow() {
    mode = "";
    step = "";
  }

  function startSchedule(service = "") {
    mode = "agendamento";
    step = "nome";
    lead.servico = service;
    addMsg(
      "bot",
      "Fechado! 🐧⚽ Vamos montar seu atendimento campeão.<br>Primeiro, qual é o seu <strong>nome</strong>?"
    );
  }

  function startBudget(service = "") {
    mode = "orcamento";
    step = "equipamento";
    lead.servico = service;
    addMsg(
      "bot",
      "Show! Vou preparar seu pré-orçamento. 🏆<br>Qual equipamento precisa de atendimento?",
      ["Ar-condicionado", "Geladeira / Freezer", "Máquina de lavar", "Serviço elétrico"]
    );
  }

  function finalMessage() {
    const text =
`Olá G&J! Vim pelo site e quero atendimento.

👤 Nome: ${lead.nome || "Não informado"}
📞 Telefone: ${lead.telefone || "Não informado"}
📍 Endereço: ${lead.endereco || "Não informado"}
🏙 Cidade: ${lead.cidade || "Não informado"}
🔧 Serviço: ${lead.servico || "Não informado"}
❄️ Equipamento: ${lead.equipamento || "Não informado"}
❓ Problema: ${lead.problema || "Não informado"}
⏰ Melhor horário: ${lead.horario || "Não informado"}`;

    return text;
  }

  function finishLead() {
    const msg = finalMessage();

    addMsg(
      "bot",
      `Perfeito! 🏆 Seu atendimento está escalado.<br><br>
      <strong>Resumo:</strong><br>
      👤 ${lead.nome || "Nome não informado"}<br>
      ❄️ ${lead.equipamento || "Equipamento não informado"}<br>
      ❓ ${lead.problema || "Problema não informado"}<br>
      ⏰ ${lead.horario || "Horário não informado"}<br>
      ${createWhatsAppButton(msg, "Enviar para a G&J")}`
    );

    resetFlow();
  }

  function handleFlow(text) {
    if (!mode) return false;

    if (mode === "agendamento") {
      if (step === "nome") {
        lead.nome = text;
        step = "telefone";
        addMsg("bot", "Boa, " + text + "! 📞 Agora me diga seu <strong>telefone</strong>.");
        return true;
      }

      if (step === "telefone") {
        lead.telefone = text;
        step = "endereco";
        addMsg("bot", "Certo! 📍 Qual é o <strong>endereço</strong> do atendimento?");
        return true;
      }

      if (step === "endereco") {
        lead.endereco = text;
        step = "cidade";
        addMsg("bot", "Qual a <strong>cidade</strong>? Atendemos Augustinópolis e região.");
        return true;
      }

      if (step === "cidade") {
        lead.cidade = text;
        step = "equipamento";
        addMsg("bot", "Agora me diga o <strong>equipamento</strong>.", ["Ar-condicionado", "Geladeira / Freezer", "Máquina de lavar", "Elétrica"]);
        return true;
      }

      if (step === "equipamento") {
        lead.equipamento = text;
        step = "problema";
        addMsg("bot", "Qual é o <strong>problema</strong> ou serviço desejado?");
        return true;
      }

      if (step === "problema") {
        lead.problema = text;
        step = "horario";
        addMsg("bot", "Perfeito. ⏰ Qual o <strong>melhor horário</strong> para atendimento?");
        return true;
      }

      if (step === "horario") {
        lead.horario = text;
        finishLead();
        return true;
      }
    }

    if (mode === "orcamento") {
      if (step === "equipamento") {
        lead.equipamento = text;
        step = "problema";
        addMsg("bot", "Entendi. Qual problema ou serviço você precisa?");
        return true;
      }

      if (step === "problema") {
        lead.problema = text;
        step = "cidade";
        addMsg("bot", "Qual sua cidade ou bairro?");
        return true;
      }

      if (step === "cidade") {
        lead.cidade = text;
        const msg =
`Olá G&J! Quero um orçamento.

🏙 Cidade/Bairro: ${lead.cidade}
🔧 Serviço: ${lead.servico || "Orçamento"}
❄️ Equipamento: ${lead.equipamento}
❓ Problema: ${lead.problema}`;

        addMsg(
          "bot",
          `Top! 🏆 Já montei seu pedido de orçamento.<br>
          Clique no botão verde e envie direto para a equipe da G&J.
          ${createWhatsAppButton(msg, "Solicitar orçamento")}`
        );

        resetFlow();
        return true;
      }
    }

    return false;
  }

  async function callBackendAI(text) {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text,
        history,
        lead
      })
    });

    if (!response.ok) {
      throw new Error("Erro na rota /api/chat");
    }

    const data = await response.json();
    return data.reply || "";
  }

  function localReply(text) {
    const t = normalize(text);

    if (t.includes("agendar") || t.includes("visita tecnica")) {
      startSchedule("Agendamento de visita técnica");
      return true;
    }

    if (t.includes("orcamento") || t.includes("valor") || t.includes("preco")) {
      startBudget("Orçamento");
      return true;
    }

    if (t.includes("ar condicionado") || t.includes("split") || t.includes("piso teto")) {
      addMsg(
        "bot",
        "Entramos em campo no ar-condicionado! ❄️⚽<br>Você precisa de instalação, manutenção ou reparo?",
        ["⚙️ Instalação", "🧼 Manutenção", "🔧 Reparo", "📅 Agendar visita"]
      );
      return true;
    }

    if (t.includes("instalacao") || t.includes("instalar")) {
      startBudget("Instalação");
      return true;
    }

    if (t.includes("manutencao") || t.includes("limpeza") || t.includes("higienizacao")) {
      startBudget("Manutenção preventiva / limpeza");
      return true;
    }

    if (t.includes("reparo") || t.includes("conserto") || t.includes("nao gela") || t.includes("vazando")) {
      startBudget("Reparo / conserto");
      return true;
    }

    if (t.includes("geladeira") || t.includes("freezer")) {
      addMsg(
        "bot",
        "Defesa forte contra pane na geladeira! 🧊🧤<br>Ela não gela, está fazendo barulho ou parou geral?",
        ["Não gela", "Faz barulho", "Parou geral", "📅 Agendar visita"]
      );
      return true;
    }

    if (t.includes("lavadora") || t.includes("maquina de lavar") || t.includes("lavar")) {
      addMsg(
        "bot",
        "Na lavadora a G&J também joga bonito! 👕⚽<br>É reparo, limpeza ou troca de peça?",
        ["🔧 Reparo", "🧼 Limpeza", "Troca de peça", "📅 Agendar visita"]
      );
      return true;
    }

    if (t.includes("eletrica") || t.includes("energia") || t.includes("disjuntor")) {
      startBudget("Serviço elétrico");
      return true;
    }

    if (t.includes("endereco") || t.includes("localizacao") || t.includes("onde fica")) {
      const msg = "Olá G&J! Quero a localização da empresa.";
      addMsg(
        "bot",
        `Estamos na <strong>Av. Goiás, 1262 - Centro, Augustinópolis - TO</strong> 📍<br>
        ${createWhatsAppButton(msg, "Chamar no WhatsApp")}`
      );
      return true;
    }

    if (t.includes("telefone") || t.includes("contato") || t.includes("whatsapp")) {
      const msg = "Olá G&J! Vim pelo site e preciso de atendimento.";
      addMsg(
        "bot",
        `Nossos contatos:<br>
        📞 (63) 9 9975-4964<br>
        💬 (63) 9 9235-4732<br>
        ${createWhatsAppButton(msg, "Falar com a equipe")}`
      );
      return true;
    }

    if (t.includes("horario") || t.includes("funciona") || t.includes("atendimento")) {
      addMsg(
        "bot",
        "Atendemos de <strong>segunda a sexta, das 8h às 18h</strong>. 🕗<br>Também temos plantão 24h para emergências. 🚨"
      );
      return true;
    }

    return false;
  }

  function fallbackReply(text) {
    const msg = "Olá G&J! Vim pelo site e preciso de atendimento.";
    addMsg(
      "bot",
      `Boa! 🐧 Posso te ajudar com orçamento ou agendamento.<br>
      Escolha uma opção abaixo ou fale direto no WhatsApp:
      ${createWhatsAppButton(msg, "Falar no WhatsApp")}`,
      ["📋 Solicitar orçamento", "📅 Agendar visita", "❄️ Ar-condicionado", "🧊 Geladeira / Freezer"]
    );
  }

  async function send(text) {
    if (!text.trim()) return;

    addMsg("user", text);
    history.push({ role: "user", content: text });

    if (handleFlow(text)) return;

    if (localReply(text)) return;

    showTyping();

    try {
      const reply = await callBackendAI(text);
      hideTyping();

      if (!reply) {
        fallbackReply(text);
        return;
      }

      history.push({ role: "assistant", content: reply });
      addMsg("bot", reply.replace(/\n/g, "<br>"));

    } catch (error) {
      hideTyping();
      fallbackReply(text);
    }
  }

  function sendMsg() {
    const value = inputEl.value.trim();
    if (!value) return;

    inputEl.value = "";
    send(value);
  }

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMsg();
  });

  window.addEventListener("DOMContentLoaded", () => {
    addMsg(
      "bot",
      `Olá! Eu sou o <strong>GEL IA 2.0</strong> 🐧⚽<br>
      Técnico Oficial da <strong>G&J Refrigeração</strong>.<br><br>
      Estou pronto para escalar o melhor atendimento contra o calor!`,
      [
        "❄️ Ar-condicionado",
        "🧊 Geladeira / Freezer",
        "👕 Máquina de lavar",
        "⚡ Serviço elétrico",
        "📋 Solicitar orçamento",
        "📅 Agendar visita"
      ]
    );
  });
</script>
